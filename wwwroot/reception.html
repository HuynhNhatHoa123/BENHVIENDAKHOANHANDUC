<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tiếp nhận Bệnh nhân | Nhân Đức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --secondary: #28a745;
            --bg: #f0f2f5;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .navbar {
            background: var(--primary);
            color: white;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        h2 {
            color: #333;
            margin-top: 0;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        .section-title {
            background: #e7f1ff;
            padding: 8px 15px;
            border-radius: 5px;
            color: var(--primary);
            font-weight: bold;
            margin: 20px 0 15px 0;
        }

        .grid-form {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

            .form-group label {
                display: block;
                font-weight: 600;
                margin-bottom: 5px;
                color: #555;
                font-size: 0.9rem;
            }

            .form-group input, .form-group select, .form-group textarea {
                width: 100%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 6px;
                box-sizing: border-box;
                font-size: 0.95rem;
            }

            .form-group textarea {
                height: 60px;
                resize: none;
            }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-save {
            background: var(--secondary);
            color: white;
        }

            .btn-save:hover {
                background: #218838;
            }

        .btn-admin {
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 6px;
            margin-right: 10px;
        }

        .row-full {
            grid-column: span 3;
        }

        /* Viền đỏ cho ô nhập liệu bị lỗi */
        .is-invalid {
            border-color: #dc3545 !important;
            background-color: #fff8f8;
        }

        /* Chữ thông báo lỗi nhỏ dưới ô */
        .error-message {
            color: #dc3545;
            font-size: 0.8rem;
            margin-top: 3px;
            display: none; /* Mặc định ẩn */
        }

        /* Toast Notification (Thanh công cụ dưới màn hình) */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
            font-weight: 500;
            transition: all 0.3s ease;
        }

            #toast.success {
                background: var(--secondary);
            }

            #toast.error {
                background: #dc3545;
            }
    </style>
</head>
<body>
    <div id="toast">Thông báo ở đây!</div>
    <div class="navbar">
        <div>
            <i class="fas fa-hospital-user"></i> <b>NHÂN ĐỨC HIS - PHÂN HỆ TIẾP TÂN</b>
        </div>
        <div id="navControls">
            <button class="btn" onclick="logout()" style="background:none; color:white;"><i class="fas fa-sign-out-alt"></i> Thoát</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2><i class="fas fa-address-card"></i> PHIẾU TIẾP NHẬN BỆNH NHÂN</h2>

            <div class="section-title"><i class="fas fa-user"></i> Thông tin hành chính</div>
            <div class="grid-form">
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="pPhone" placeholder="090...">
                        <button class="btn btn-save" style="padding: 5px 12px;" onclick="searchPatient()"><i class="fas fa-search"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Họ và tên *</label>
                    <input type="text" id="pFullName" placeholder="NGUYỄN VĂN A">
                    <span id="nameError" class="error-message">Vui lòng nhập họ tên bệnh nhân!</span>
                </div>
                <div class="form-group">
                    <label>Ngày sinh</label>
                    <input type="date" id="pBirthday">
                </div>
                <div class="form-group">
                    <label>Giới tính</label>
                    <select id="pGender">
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nghề nghiệp</label>
                    <input type="text" id="pOccupation" placeholder="Ví dụ: Công nhân">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="pEmail" placeholder="abc@gmail.com">
                </div>
            </div>

            <div class="section-title"><i class="fas fa-map-marker-alt"></i> Địa chỉ liên lạc</div>
            <div class="grid-form">
                <div class="form-group">
                    <label>Tỉnh / Thành phố</label>
                    <input type="text" id="pProvince" placeholder="Chọn tỉnh...">
                </div>
                <div class="form-group">
                    <label>Quận / Huyện</label>
                    <input type="text" id="pDistrict" placeholder="Chọn huyện...">
                </div>
                <div class="form-group">
                    <label>Phường / Xã</label>
                    <input type="text" id="pWard" placeholder="Chọn xã...">
                </div>
                <div class="form-group row-full">
                    <label>Số nhà, tên đường</label>
                    <input type="text" id="pAddress" placeholder="Số 123, đường...">
                </div>
            </div>

            <div class="section-title"><i class="fas fa-stethoscope"></i> Thông tin tiếp nhận</div>
            <div class="grid-form">
                <div class="form-group row-full">
                    <label>Lý do vào viện (Triệu chứng ban đầu)</label>
                    <textarea id="pReason" placeholder="Đau đầu, sốt cao..."></textarea>
                </div>
            </div>

            <div style="text-align: right; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                <button class="btn" style="background:#dee2e6;" onclick="location.reload()">LÀM MỚI</button>
                <button class="btn btn-save" style="padding: 12px 35px;" onclick="savePatient()">
                    <i class="fas fa-plus-circle"></i> LƯU & ĐĂNG KÝ KHÁM
                </button>
            </div>
        </div>
    </div>

    <script>
        // Kiểm tra đăng nhập và phân quyền
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = 'login.html';

        // Hiển thị nút quay lại Admin nếu là Admin
        if (user.selectedRole === 'Admin') {
            const nav = document.getElementById('navControls');
            const adminBtn = document.createElement('a');
            adminBtn.href = 'admin.html';
            adminBtn.className = 'btn-admin';
            adminBtn.innerHTML = '<i class="fas fa-user-shield"></i> Quản trị';
            nav.prepend(adminBtn);
        }

        // Hàm hiển thị thông báo Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.className = type === 'success' ? 'toast-success' : 'toast-error';
            toast.style.display = 'block';

            // Tự động ẩn sau 3 giây
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // Hàm lưu bệnh nhân chính
        async function savePatient() {
            // 1. Lấy các phần tử giao diện
            const nameInput = document.getElementById('pFullName');
            const nameError = document.getElementById('nameError');

            // 2. Reset trạng thái lỗi
            nameInput.classList.remove('is-invalid');
            nameError.style.display = 'none';

            // 3. Thu thập dữ liệu
            const patientData = {
                fullName: nameInput.value.trim(),
                birthday: document.getElementById('pBirthday').value || null,
                gender: document.getElementById('pGender').value,
                phone: document.getElementById('pPhone').value,
                email: document.getElementById('pEmail').value,
                occupation: document.getElementById('pOccupation').value,
                address: document.getElementById('pAddress').value,
                ward: document.getElementById('pWard').value,
                district: document.getElementById('pDistrict').value,
                province: document.getElementById('pProvince').value,
                reason: document.getElementById('pReason').value,
                status: "Chờ khám"
            };

            // 4. KIỂM TRA LỖI (Validation)
            if (!patientData.fullName) {
                nameInput.classList.add('is-invalid'); // Hiện viền đỏ ô input
                nameError.style.display = 'block';      // Hiện dòng chữ báo lỗi
                nameInput.focus();                     // Đưa con trỏ chuột vào ô lỗi
                return;                                // Dừng lại, không gửi dữ liệu
            }

            // 5. GỬI DỮ LIỆU ĐI (Fetch API)
            try {
                const response = await fetch('/api/Patients', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(patientData)
                });

                if (response.ok) {
                    showToast("✅ Đã tiếp nhận bệnh nhân thành công!", "success");
                    // Đợi 1.5 giây để người dùng thấy thông báo rồi mới làm mới trang
                    setTimeout(() => {
                        location.reload();
                    }, 1500);
                } else {
                    showToast("❌ Lỗi: Không thể lưu dữ liệu vào hệ thống!", "error");
                }
            } catch (err) {
                console.error("Lỗi kết nối:", err);
                showToast("⚠️ Lỗi kết nối đến máy chủ!", "error");
            }
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        async function searchPatient() {
            const phone = document.getElementById('pPhone').value;
            if (!phone) {
                alert("Vui lòng nhập số điện thoại để tìm kiếm!");
                return;
            }

            try {
                // Gọi API tìm kiếm bệnh nhân theo số điện thoại
                const response = await fetch(`/api/Patients/search?phone=${phone}`);

                if (response.ok) {
                    const patient = await response.json();

                    if (patient) {
                        // Tự động điền dữ liệu vào các ô input
                        document.getElementById('pFullName').value = patient.fullName || '';
                        document.getElementById('pBirthday').value = patient.birthday ? patient.birthday.split('T')[0] : '';
                        document.getElementById('pGender').value = patient.gender || 'Nam';
                        document.getElementById('pOccupation').value = patient.occupation || '';
                        document.getElementById('pEmail').value = patient.email || '';
                        document.getElementById('pProvince').value = patient.province || '';
                        document.getElementById('pDistrict').value = patient.district || '';
                        document.getElementById('pWard').value = patient.ward || '';
                        document.getElementById('pAddress').value = patient.address || '';

                        alert("Đã tìm thấy thông tin bệnh nhân cũ!");
                    }
                } else if (response.status === 404) {
                    alert("Bệnh nhân mới (Không tìm thấy dữ liệu cũ). Hãy nhập thông tin mới.");
                }
            } catch (err) {
                console.error("Lỗi tìm kiếm:", err);
                alert("Lỗi kết nối khi tìm kiếm bệnh nhân!");
            }
        }
    </script>
</body>
</html>
